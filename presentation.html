<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walmart — Store Sales Forecasting</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Georgian:wght@400;500;600;700&display=swap');

:root{
  --bg:#080B14; --bg2:#0B1120; --panel:#0F172A; --panel2:#131E33;
  --line:#1E2A44; --line2:#26324E;
  --ink:#E6EDF7; --sub:#93A1BC; --muted:#5C6B87;
  --cyan:#22D3EE; --teal:#2DD4BF; --blue:#60A5FA; --violet:#A78BFA;
  --amber:#FBBF24; --green:#4ADE80; --greenDim:#16351f;
  --grid:rgba(34,211,238,.05);
  --f-disp:"Space Grotesk", "Noto Sans Georgian", system-ui, sans-serif;
  --f-body:"Inter", "Noto Sans Georgian", system-ui, sans-serif;
  --f-mono:"JetBrains Mono", ui-monospace, Menlo, monospace;
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--ink); font-family:var(--f-body);
  overflow:hidden; -webkit-font-smoothing:antialiased;
  display:flex; align-items:center; justify-content:center;
}

/* ---- viewport / stage scaling ---- */
#viewport{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
#stage{
  position:relative; width:1280px; height:720px; transform-origin:center center;
  background:radial-gradient(120% 120% at 15% 0%, #0C1424 0%, var(--bg) 55%);
  overflow:hidden; box-shadow:0 40px 120px -40px rgba(0,0,0,.8);
}
/* plot grid backdrop */
#stage::before{
  content:""; position:absolute; inset:0; pointer-events:none;
  background-image:linear-gradient(var(--grid) 1px, transparent 1px),
                   linear-gradient(90deg,var(--grid) 1px, transparent 1px);
  background-size:48px 48px; mask-image:radial-gradient(130% 120% at 20% 10%, #000 55%, transparent 100%);
}

/* ---- slides ---- */
.slide{ position:absolute; inset:0; padding:64px 72px; opacity:0; visibility:hidden;
  transform:translateY(14px) scale(.995); transition:opacity .5s ease, transform .5s ease, visibility .5s;
  display:flex; flex-direction:column; }
.slide.active{ opacity:1; visibility:visible; transform:none; }
.slide.pre{ transform:translateY(-14px) scale(.995); }

/* staggered reveal for active slide children */
.slide.active .reveal{ animation:rise .6s cubic-bezier(.2,.7,.2,1) backwards; }
.slide.active .reveal:nth-child(1){animation-delay:.05s}
.slide.active .reveal:nth-child(2){animation-delay:.12s}
.slide.active .reveal:nth-child(3){animation-delay:.19s}
.slide.active .reveal:nth-child(4){animation-delay:.26s}
.slide.active .reveal:nth-child(5){animation-delay:.33s}
@keyframes rise{from{opacity:0; transform:translateY(16px)} to{opacity:1; transform:none}}

/* ---- shared type ---- */
.eyebrow{ display:inline-flex; align-items:center; gap:10px; font-family:var(--f-mono);
  font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--c,var(--cyan));
  font-weight:500; }
.eyebrow .mk{ width:9px; height:9px; background:var(--c,var(--cyan)); box-shadow:0 0 12px var(--c,var(--cyan));
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%); }
.s-title{ font-family:var(--f-disp); font-weight:600; font-size:46px; line-height:1.05;
  letter-spacing:-.02em; margin-top:16px; }
.s-title.sm{ font-size:38px; }
.lead{ color:var(--sub); font-size:17px; max-width:820px; line-height:1.5; }

/* ---- tables ---- */
.tbl-wrap{ margin-top:26px; border:1px solid var(--line); border-radius:12px; overflow:hidden;
  background:var(--panel); }
table{ width:100%; border-collapse:collapse; font-size:14px; }
thead th{ background:linear-gradient(180deg,#12233b,#0E1B30); color:var(--ink);
  font-family:var(--f-mono); font-weight:500; font-size:11.5px; letter-spacing:.06em; text-transform:uppercase;
  text-align:left; padding:13px 18px; border-bottom:1px solid var(--line2); color:var(--sub); }
tbody td{ padding:12px 18px; border-bottom:1px solid var(--line); color:var(--ink); vertical-align:middle; }
tbody tr:last-child td{ border-bottom:none; }
tbody tr:nth-child(even) td{ background:rgba(255,255,255,.012); }
td.num, th.num{ text-align:right; font-family:var(--f-mono); font-variant-numeric:tabular-nums; }
td.key{ font-weight:500; }
.mono{ font-family:var(--f-mono); }
.chip-hint{ color:var(--sub); }
tr.best td{ background:linear-gradient(90deg, rgba(74,222,128,.14), rgba(74,222,128,.05)) !important;
  color:#D7FBE2; }
tr.best td.key{ color:var(--green); font-weight:600; }
tr.best td.num{ color:#B9F6CA; font-weight:600; }
tr.best td:first-child{ box-shadow:inset 3px 0 0 var(--green); }
tr.nodata td{ text-align:center; color:var(--muted); font-style:italic; font-family:var(--f-mono);
  padding:20px; letter-spacing:.04em; }
.delta{ color:var(--cyan); }
.warn{ color:var(--amber); }
.tag-ok{ color:var(--green); } .tag-plan{ color:var(--amber); }

/* ---- overview ---- */
.two-col{ display:grid; grid-template-columns:1.05fr 1.25fr; gap:40px; margin-top:30px; flex:1; }
.h-sm{ font-family:var(--f-mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--cyan); margin-bottom:10px; }
.chal{ list-style:none; display:flex; flex-direction:column; gap:11px; margin-top:22px; }
.chal li{ display:flex; gap:12px; align-items:flex-start; font-size:14.5px; color:var(--ink);
  background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:11px 14px; }
.chal li b{ color:var(--cyan); font-family:var(--f-mono); font-weight:500; }
.dot{ width:7px; height:7px; border-radius:50%; background:var(--cyan); margin-top:6px; flex:none;
  box-shadow:0 0 10px var(--cyan); }
.stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; align-content:start; }
.stat{ background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--line);
  border-radius:12px; padding:18px 20px; position:relative; overflow:hidden; }
.stat .v{ font-family:var(--f-disp); font-weight:600; font-size:38px; letter-spacing:-.02em; color:#fff;
  font-variant-numeric:tabular-nums; }
.stat .v small{ font-size:20px; color:var(--cyan); }
.stat .l{ font-size:12.5px; color:var(--sub); margin-top:4px; }
.stat::after{ content:""; position:absolute; right:-30px; top:-30px; width:90px; height:90px;
  background:radial-gradient(circle, rgba(34,211,238,.10), transparent 70%); }

/* ---- feature cards ---- */
.card-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:28px; }
.fcard{ background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:18px 20px;
  position:relative; }
.fcard h3{ font-family:var(--f-disp); font-weight:600; font-size:17px; color:var(--cc,var(--cyan));
  display:flex; align-items:center; gap:9px; }
.fcard h3::before{ content:""; width:8px; height:8px; background:var(--cc,var(--cyan)); border-radius:2px;
  box-shadow:0 0 10px var(--cc,var(--cyan)); }
.fcard ul{ list-style:none; margin-top:12px; display:flex; flex-direction:column; gap:7px; }
.fcard li{ font-size:13px; color:var(--sub); padding-left:14px; position:relative; }
.fcard li::before{ content:"›"; position:absolute; left:0; color:var(--cc,var(--cyan)); font-family:var(--f-mono); }
.pipe-note{ margin-top:22px; background:linear-gradient(90deg,#0C1A2E,var(--panel));
  border:1px solid var(--line2); border-left:3px solid var(--cyan); border-radius:10px;
  padding:15px 20px; font-size:14px; color:var(--ink); }
.pipe-note b{ color:var(--cyan); } .pipe-note code{ font-family:var(--f-mono); color:var(--teal); font-size:13px; }

/* ---- model header & notes ---- */
.mhead{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:6px; }
.mhead .m-name{ font-family:var(--f-disp); font-weight:700; font-size:82px; letter-spacing:-.03em;
  background:linear-gradient(180deg,#fff,#9FE9F5); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1; }
.mhead .m-fam{ font-family:var(--f-mono); font-size:15px; letter-spacing:.14em; text-transform:uppercase; color:var(--cyan); margin-top:14px; }
.mhead .m-role{ color:var(--sub); font-size:16px; max-width:660px; margin-top:12px; line-height:1.5; }
.kv{ margin-top:26px; display:flex; flex-direction:column; gap:2px; background:#0A1120;
  border:1px solid var(--line); border-radius:12px; padding:16px 26px; min-width:520px; }
.kv .row{ display:flex; justify-content:space-between; gap:40px; padding:6px 0; font-family:var(--f-mono); font-size:14px; border-bottom:1px dashed var(--line); }
.kv .row:last-child{ border-bottom:none; }
.kv .k{ color:var(--muted); } .kv .val{ color:#fff; font-weight:500; }
.placeholder{ margin-top:24px; font-family:var(--f-mono); font-size:14px; color:var(--amber);
  border:1px dashed #4a3a15; background:rgba(251,191,36,.05); border-radius:10px; padding:14px 22px; letter-spacing:.02em;}
.m-index{ position:absolute; top:64px; right:72px; font-family:var(--f-mono); color:var(--muted); font-size:13px; letter-spacing:.1em; }

.notes{ margin-top:20px; display:flex; flex-direction:column; gap:12px; }
.note{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 20px;
  display:flex; gap:16px; align-items:flex-start; font-size:14px; line-height:1.5; color:var(--ink); }
.note .idx{ font-family:var(--f-mono); color:var(--cyan); font-size:12px; padding-top:2px; flex:none; min-width:26px; }
.note b{ color:var(--cyan); font-family:var(--f-mono); font-weight:500; font-size:13px; }

/* Image wrap for slides */
.img-wrap { 
  margin-top: 20px; 
  border-radius: 12px; 
  overflow: hidden; 
  border: 1px solid var(--line); 
  background: var(--panel2); 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  gap: 20px; 
  padding: 14px; 
  min-height: 120px; 
}
.img-wrap img { 
  flex: 1 1 0; 
  min-width: 0; 
  max-width: 100%; 
  max-height: 250px; 
  object-fit: contain; 
  border-radius: 6px; 
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
}

/* ---- results chart ---- */
.res-wrap{ display:grid; grid-template-columns:1.15fr 1fr; gap:34px; margin-top:24px; flex:1; }
.bars{ display:flex; flex-direction:column; gap:12px; align-self:center; }
.bar-row{ display:grid; grid-template-columns:92px 1fr; align-items:center; gap:14px; }
.bar-row .nm{ font-family:var(--f-mono); font-size:13px; color:var(--sub); text-align:right; }
.bar-track{ position:relative; height:30px; background:#0C1526; border:1px solid var(--line); border-radius:7px; overflow:hidden; }
.bar-fill{ position:absolute; inset:0 auto 0 0; width:0; border-radius:6px;
  background:linear-gradient(90deg,#155E75,var(--cyan)); transition:width 1.1s cubic-bezier(.2,.75,.2,1); }
.bar-row.best .bar-fill{ background:linear-gradient(90deg,#166534,var(--green)); box-shadow:0 0 16px rgba(74,222,128,.4);}
.bar-row.na .bar-track{ opacity:.5; }
.bar-val{ position:absolute; right:10px; top:50%; transform:translateY(-50%); font-family:var(--f-mono);
  font-size:12.5px; color:#fff; opacity:0; transition:opacity .5s ease .6s; }
.slide.active .bar-val{ opacity:1; }
.bar-na{ position:absolute; left:12px; top:50%; transform:translateY(-50%); font-family:var(--f-mono);
  font-size:12px; color:var(--muted); }
.axis-note{ font-family:var(--f-mono); font-size:11px; color:var(--muted); margin-top:12px; text-align:right; }
.res-tbl .tbl-wrap{ margin-top:0; }

/* winner banner */
.winner{ margin-top:20px; display:flex; align-items:center; gap:16px; background:linear-gradient(90deg,#0B2416,#0E1B30);
  border:1px solid #1c5233; border-radius:12px; padding:16px 22px; }
.winner .badge{ font-family:var(--f-mono); font-size:12px; letter-spacing:.1em; text-transform:uppercase;
  color:#052e16; background:var(--green); padding:6px 12px; border-radius:6px; font-weight:600; flex:none;
  box-shadow:0 0 20px rgba(74,222,128,.4); }
.winner p{ font-size:14.5px; color:var(--ink); } .winner b{ color:var(--green); }

/* ---- title slide ---- */
#s-title-slide{ justify-content:center; }
.hero-wave{ position:absolute; inset:0; z-index:0; pointer-events:none; }
.hero-inner{ position:relative; z-index:1; }
.hero-kick{ font-family:var(--f-mono); font-size:13px; letter-spacing:.34em; color:var(--cyan);
  text-transform:uppercase; }
.hero-h1{ font-family:var(--f-disp); font-weight:700; letter-spacing:-.03em; margin-top:22px; line-height:.98; }
.hero-h1 .w{ font-size:104px; display:block; color:#fff; }
.hero-h1 .sub{ font-size:60px; display:block; background:linear-gradient(90deg,var(--cyan),var(--teal)); -webkit-background-clip:text; background-clip:text; color:transparent; }
.hero-lead{ margin-top:26px; color:var(--sub); font-size:19px; max-width:760px; line-height:1.5; }
.hero-chips{ display:flex; gap:16px; margin-top:40px; flex-wrap:wrap; }
.hchip{ background:rgba(11,17,32,.7); border:1px solid var(--line2); border-radius:11px; padding:12px 18px; backdrop-filter:blur(4px); }
.hchip .k{ font-family:var(--f-mono); font-size:10px; letter-spacing:.18em; color:var(--cyan); text-transform:uppercase; }
.hchip .v{ font-size:15px; color:#fff; font-weight:600; margin-top:4px; }

/* ---- chrome: progress, counter, controls, toc ---- */
#progress{ position:absolute; left:0; top:0; height:3px; width:0; z-index:20;
  background:linear-gradient(90deg,var(--cyan),var(--teal)); box-shadow:0 0 12px var(--cyan); transition:width .4s ease; }
#counter{ position:absolute; bottom:26px; right:32px; font-family:var(--f-mono); font-size:13px;
  color:var(--muted); letter-spacing:.12em; z-index:20; }
#counter b{ color:var(--cyan); font-weight:500; }
#brand{ position:absolute; bottom:26px; left:32px; font-family:var(--f-mono); font-size:11px;
  color:var(--muted); letter-spacing:.14em; z-index:20; text-transform:uppercase; }
.nav-zone{ position:absolute; top:0; bottom:0; width:22%; z-index:10; cursor:pointer; }
.nav-zone.prev{ left:0; } .nav-zone.next{ right:0; }
#hint{ position:absolute; bottom:24px; left:50%; transform:translateX(-50%); font-family:var(--f-mono);
  font-size:11px; color:var(--muted); z-index:20; letter-spacing:.1em; transition:opacity .6s; }

/* TOC overlay */
#toc{ position:fixed; inset:0; background:rgba(4,7,14,.92); backdrop-filter:blur(8px); z-index:40;
  display:none; padding:56px 64px; overflow:auto; }
#toc.open{ display:block; }
#toc h2{ font-family:var(--f-disp); font-size:24px; margin-bottom:24px; color:#fff; }
.toc-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px 26px; }
.toc-item{ display:flex; gap:12px; padding:9px 12px; border-radius:8px; cursor:pointer; align-items:baseline;
  border:1px solid transparent; }
.toc-item:hover{ background:var(--panel); border-color:var(--line2); }
.toc-item .n{ font-family:var(--f-mono); font-size:12px; color:var(--cyan); min-width:26px; }
.toc-item .t{ font-size:14px; color:var(--ink); }
.toc-item.sec .t{ color:var(--muted); text-transform:uppercase; font-family:var(--f-mono); font-size:11px; letter-spacing:.1em; }

@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
  .bar-fill{ transition:none; }
}
</style>
</head>
<body>
<div id="viewport">
  <div id="stage">
    <div id="progress"></div>
    <div id="brand">Walmart · გაყიდვების პროგნოზირება</div>
    <div id="counter"><b id="cnum">01</b> / <span id="ctot">30</span></div>
    <div id="hint">← → ნავიგაცია · M მენიუ · F სრული ეკრანი</div>
    <div class="nav-zone prev" data-nav="-1"></div>
    <div class="nav-zone next" data-nav="1"></div>
    <div id="deck"></div>
  </div>
</div>
<div id="toc"><h2>სარჩევი</h2><div class="toc-grid" id="tocGrid"></div></div>

<script>
/* ============================ CONTENT ============================ */
const CAT = { clean:"var(--cyan)", cal:"var(--blue)", hol:"var(--violet)", lag:"var(--teal)", md:"var(--amber)", enc:"var(--green)" };

const featureCats = [
  { name:"Data Cleaning & Outliers", c:"clean", rows:[
    ["Outlier-ების მოშორება","+-4.5σ-ზე მეტი მნიშვნელობების (1.75%) clipping IQR-ის გამოყენებით.","ყველა მოდელი"],
    ["უარყოფითი გაყიდვები","უარყოფითი Sales ველის გასწორება (clipping), რათა მოდელმა უარყოფითი შემოსავალი არ დააფრედიქთოს.","ყველა მოდელი"],
  ]},
  { name:"კალენდარის Feature-ები", c:"cal", rows:[
    ["ციკლური კვირები (sin/cos)","სინუსის და კოსინუსის დამატება კვირის ნომერზე.", "Tree + N-BEATSx"],
    ["Weeks_elapsed","რამდენი კვირა გავიდა პირველი ჩანაწერიდან.", "Tree + N-BEATSx"],
    ["WeekofMonth","თვის რომელი კვირაა - გვეხმარება ხელფასის კვირების ტრენდის დაჭერაში.", "Tree + N-BEATSx"],
  ]},
  { name:"დღესასწაულის (Holiday) Feature-ები", c:"hol", rows:[
    ["isSigned","დღესასწაულამდე უარყოფითი რიცხვები, შემდეგ დადებითი.", "Tree + N-BEATSx"],
    ["Days_to / Days_post","კონკრეტულ დღესასწაულამდე და მის შემდეგ დარჩენილი დღეების თვლა.", "Tree + N-BEATSx"],
    ["HOLIDAYS კალენდარი","საერთო დღესასწაულების თარიღები; Prophet-ი ამას თავისი API-ით კითხულობს.","ყველა მოდელი"],
  ]},
  { name:"Lag, Ratio & Rolling", c:"lag", rows:[
    ["Lag მახასიათებლები","გაყიდვები 1 კვირის, 4 კვირის და 1 წლის წინ - ცალკე ველებად.","Tree + N-BEATSx"],
    ["YoY ზრდის მაჩვენებელი","ბოლო 4 კვირის საშუალო გაყოფილი 1 წლის წინანდელ ანალოგიურ მონაკვეთზე.","Tree + N-BEATSx"],
    ["Rolling სტატისტიკები","გვეხმარება ხმაურის გაფილტვრაში და მოდელს უფრო სტაბილურ ინფორმაციას აძლევს.","Tree + N-BEATSx"],
  ]},
  { name:"აქციები (Markdown)", c:"md", rows:[
    ["MD_total / count / max", "აქციების უფრო ეფექტიანად აღმწერი აგრეგირებული ველები.", "Tree + N-BEATSx"],
    ["MD_nonzero_mean","აქტიური აქციების საშუალო მაჩვენებელი, ცარიელი კვირების გამოტოვებით.", "Tree + N-BEATSx"],
    ["Holiday markdown გამოყოფა","სადღესასწაულო ფასდაკლებების ცალკე გამოყოფა, რადგან მათ განსხვავებული ეფექტი აქვთ.", "Tree + N-BEATSx"],
  ]},

function eyebrow(text, c){ return `<div class="eyebrow reveal" style="--c:${c||'var(--cyan)'}"><span class="mk"></span>${text}</div>`; }

function trialTable(headers, rows){
  const head = headers.map((h,i)=>`<th class="${i>=2&&i<=3?'num':''}">${h}</th>`).join("");
  let body;
  if(!rows.length){
    body = `<tr class="nodata"><td colspan="${headers.length}">— მონაცემები არ არის —</td></tr>`;
  } else {
    body = rows.map(r=>{
      const cells = Array.isArray(r)? r : r.cells;
      const cls = (r.best)?"best":"";
      return `<tr class="${cls}">`+ cells.map((c,i)=>{
        const isNum = i>=2 && i<=3;
        const kcls = i===0?"key":"";
        const extra = (c==="N/A"||c==="—")?"chip-hint":"";
        return `<td class="${isNum?'num':''} ${kcls} ${extra}">${c||""}</td>`;
      }).join("") + `</tr>`;
    }).join("");
  }
  return `<div class="tbl-wrap reveal"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

/* ============================ ENGINE ============================ */
const deckEl = document.getElementById("deck");
deckEl.innerHTML = slides.map(s=>s.html).join("");
const slideEls = Array.from(deckEl.querySelectorAll(".slide"));
const total = slideEls.length;
document.getElementById("ctot").textContent = total;
let cur = 0;

function activate(idx, dir){
  idx = Math.max(0, Math.min(total-1, idx));
  slideEls.forEach((el,i)=>{
    el.classList.toggle("active", i===idx);
    el.classList.toggle("pre", i<idx);
    if(i!==idx){ // reset animated bits so they replay on return
      el.querySelectorAll("[data-bar]").forEach(b=>b.style.width="0");
    }
  });
  cur = idx;
  document.getElementById("cnum").textContent = String(idx+1).padStart(2,"0");
  document.getElementById("progress").style.width = ((idx)/(total-1)*100)+"%";
  runSlideAnims(slideEls[idx]);
  if(idx>0){ const h=document.getElementById("hint"); if(h) h.style.opacity="0"; }
}

function runSlideAnims(el){
  // count-ups
  el.querySelectorAll("[data-countup]").forEach(node=>{
    const target = +node.getAttribute("data-countup");
    if(!window.requestAnimationFrame){ node.textContent = target.toLocaleString(); return; }
    const dur=900, t0=performance.now();
    (function step(t){
      const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
      node.textContent = Math.round(target*e).toLocaleString();
      if(p<1) requestAnimationFrame(step);
    })(t0);
  });
  // bars
  el.querySelectorAll("[data-bar]").forEach((b,i)=>{
    const w=b.getAttribute("data-bar");
    setTimeout(()=>{ b.style.width=w+"%"; }, 120 + i*70);
  });
}

function go(d){ activate(cur+d); }

/* controls */
document.querySelectorAll(".nav-zone").forEach(z=>z.addEventListener("click",()=>go(+z.dataset.nav)));
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="PageDown"||e.key===" "){ e.preventDefault(); go(1); }
  else if(e.key==="ArrowLeft"||e.key==="PageUp"){ e.preventDefault(); go(-1); }
  else if(e.key==="Home"){ activate(0); }
  else if(e.key==="End"){ activate(total-1); }
  else if(e.key.toLowerCase()==="m"){ toggleTOC(); }
  else if(e.key.toLowerCase()==="f"){ toggleFS(); }
  else if(e.key==="Escape"){ document.getElementById("toc").classList.remove("open"); }
});
/* touch swipe */
let tx=0;
document.getElementById("stage").addEventListener("touchstart",e=>tx=e.touches[0].clientX,{passive:true});
document.getElementById("stage").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50) go(dx<0?1:-1);
},{passive:true});

/* TOC */
const tocGrid=document.getElementById("tocGrid");
tocGrid.innerHTML = slides.map((s,i)=>`<div class="toc-item ${s.sec?'sec':''}" data-i="${i}"><span class="n">${String(i+1).padStart(2,'0')}</span><span class="t">${s.title}</span></div>`).join("");
tocGrid.querySelectorAll(".toc-item").forEach(it=>it.addEventListener("click",()=>{ activate(+it.dataset.i); toggleTOC(); }));
function toggleTOC(){ document.getElementById("toc").classList.toggle("open"); }
function toggleFS(){ if(!document.fullscreenElement){ document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen(); } else { document.exitFullscreen&&document.exitFullscreen(); } }

/* scaling */
function fit(){
  const s = Math.min(window.innerWidth/1280, window.innerHeight/720);
  document.getElementById("stage").style.transform = `scale(${s})`;
}
window.addEventListener("resize",fit);
fit();
activate(0);
</script>
